<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MyWealth</title>
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MyWealth">
  <meta name="theme-color" content="#0a0a0f">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f; --bg2: #111118; --card: #16161f; --card2: #1c1c28;
      --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
      --text: #f0f0f8; --muted: #6b6b80; --muted2: #9090a8;
      --green: #00d084; --green-s: rgba(0,208,132,0.12);
      --red: #ff4d6d; --red-s: rgba(255,77,109,0.12);
      --blue: #4d9fff; --blue-s: rgba(77,159,255,0.12);
      --gold: #f5c842; --purple: #a78bfa;
      --nav-h: 75px; --r: 20px; --r-sm: 12px;
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0; }
    body { font-family:'Inter','Sarabun',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding-bottom:calc(var(--nav-h)+120px); overscroll-behavior-y:none; }
    .wrap { max-width:600px; margin:0 auto; padding:16px; }
    .view { display:none; }
    .view.active { display:block; animation:up 0.3s ease; }
    @keyframes up { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .hidden { display:none !important; }

    /* Topbar */
    .topbar { display:flex; justify-content:space-between; align-items:center; padding:16px 16px 0; max-width:600px; margin:0 auto; }
    .logo { font-size:1.1rem; font-weight:800; letter-spacing:-0.5px; }
    .logo span { color:var(--blue); }
    .cloud-pill { font-size:0.68rem; font-weight:700; padding:5px 10px; border-radius:20px; background:var(--card2); color:var(--muted2); border:1px solid var(--border); }
    .cloud-pill.ok { color:var(--green); border-color:rgba(0,208,132,0.3); background:var(--green-s); }
    .av { width:32px; height:32px; border-radius:50%; object-fit:cover; display:none; border:2px solid var(--border2); margin-left:8px; }

    /* Hero */
    .hero { background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%); border-radius:var(--r); padding:26px 22px; margin-bottom:14px; position:relative; overflow:hidden; border:1px solid var(--border2); }
    .hero::before { content:''; position:absolute; top:-40px; right:-40px; width:160px; height:160px; border-radius:50%; background:radial-gradient(circle,rgba(77,159,255,0.18) 0%,transparent 70%); }
    .h-label { font-size:0.73rem; color:rgba(255,255,255,0.45); font-weight:600; margin-bottom:5px; }
    .h-amt { font-size:2.5rem; font-weight:800; letter-spacing:-1.5px; line-height:1.05; }
    .h-sub { font-size:0.78rem; color:rgba(255,255,255,0.4); margin-top:8px; }
    .h-sub b { color:rgba(255,255,255,0.8); }
    .h-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:1px; background:rgba(255,255,255,0.06); border-radius:12px; margin-top:18px; overflow:hidden; }
    .hs { background:rgba(0,0,0,0.25); padding:11px 8px; text-align:center; }
    .hs-l { font-size:0.62rem; color:rgba(255,255,255,0.38); font-weight:700; text-transform:uppercase; letter-spacing:0.4px; display:block; margin-bottom:3px; }
    .hs-v { font-size:0.88rem; font-weight:700; }

    /* Section */
    .sec-t { font-size:0.75rem; font-weight:700; color:var(--muted2); text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:18px; margin-bottom:12px; }
    .card-hdr { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
    .card-t { font-size:0.85rem; font-weight:700; }

    /* Month card */
    .mc { background:var(--card); border:1px solid var(--border); border-radius:var(--r-sm); padding:13px 15px; display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; cursor:pointer; transition:all 0.2s; }
    .mc:active { transform:scale(0.98); background:var(--card2); }
    .mc-l { display:flex; align-items:center; gap:11px; }
    .mc-n { width:36px; height:36px; border-radius:10px; background:var(--card2); border:1px solid var(--border2); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:0.82rem; color:var(--muted2); }
    .mc-name { font-weight:600; font-size:0.92rem; }
    .mc-sub { font-size:0.7rem; color:var(--muted); margin-top:1px; }
    .mc-bal { font-weight:800; font-size:0.95rem; }

    /* Portfolio */
    .port-wrap { display:flex; gap:14px; align-items:center; margin-top:8px; }
    .port-chart { width:78px; height:78px; flex-shrink:0; }
    .port-list { flex:1; }
    .port-item { display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; font-size:0.76rem; }
    .port-dot { width:7px; height:7px; border-radius:50%; margin-right:5px; display:inline-block; }

    /* Nav top */
    .nav-top { display:flex; align-items:center; gap:12px; padding:18px 16px 8px; max-width:600px; margin:0 auto; }
    .btn-back { width:40px; height:40px; border-radius:11px; background:var(--card); border:1px solid var(--border); color:var(--text); font-size:0.95rem; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
    .page-t { font-size:1.1rem; font-weight:800; }

    /* Inputs */
    .inp { width:100%; padding:11px 13px; border-radius:var(--r-sm); border:1px solid var(--border); background:var(--bg2); color:var(--text); font-size:0.92rem; font-family:'Sarabun','Inter'; outline:none; transition:border-color 0.2s; }
    .inp:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(77,159,255,0.08); }
    .inp-sm { padding:8px 11px; font-size:0.85rem; border-radius:10px; }
    .inp-num { text-align:right; width:85px; }

    /* Detail rows */
    .drow { display:flex; align-items:center; gap:7px; margin-bottom:7px; background:var(--bg2); padding:8px 9px; border-radius:var(--r-sm); border:1px solid var(--border); }
    .drow.paid { opacity:0.45; }
    .bdg { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:0.82rem; color:#fff; flex-shrink:0; cursor:pointer; }
    .b-inc { background:var(--green); } .b-exp { background:var(--red); }
    .desc-inp { flex:1; min-width:0; background:transparent; border:none; color:var(--text); font-size:0.88rem; font-family:'Sarabun','Inter'; outline:none; padding:3px 0; }
    .amt-inp { width:80px; text-align:right; background:transparent; border:none; color:var(--text); font-weight:700; font-size:0.88rem; outline:none; }
    .paid-box { width:24px; height:24px; border-radius:7px; border:1.5px solid var(--border2); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; transition:all 0.2s; font-size:0.68rem; color:#fff; }
    .paid-box.on { background:var(--green); border-color:var(--green); }
    .del-btn { width:24px; height:24px; border-radius:50%; border:none; background:var(--red-s); color:var(--red); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:0.72rem; flex-shrink:0; }
    .sel { flex:1; background:transparent; border:none; color:var(--text); font-size:0.88rem; font-family:'Sarabun','Inter'; outline:none; }
    .sel option { background:var(--card2); color:var(--text); }

    /* Buttons */
    .btn-pill { padding:8px 16px; border-radius:50px; border:none; font-weight:700; cursor:pointer; display:inline-flex; align-items:center; gap:5px; font-size:0.8rem; transition:all 0.15s; }
    .btn-pill:active { transform:scale(0.95); }
    .btn-g { background:var(--green); color:#000; } .btn-b { background:var(--blue); color:#000; }
    .btn-r { background:var(--red); color:#fff; } .btn-p { background:var(--purple); color:#000; }
    .btn-full { width:100%; padding:13px; border-radius:50px; border:none; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; font-size:0.92rem; margin-bottom:9px; transition:all 0.15s; }

    /* Action Grid */
    .act-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:9px; margin:18px 0; }
    .act-btn { border-radius:16px; border:none; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px; color:#fff; height:76px; font-weight:700; font-size:0.75rem; transition:transform 0.15s; }
    .act-btn:active { transform:scale(0.93); }
    .act-btn i { font-size:1.15rem; }
    .act-inc { background:linear-gradient(135deg,var(--green),#00b8a9); }
    .act-exp { background:linear-gradient(135deg,var(--red),#ff6b35); }
    .act-scan { background:linear-gradient(135deg,#6366f1,#8b5cf6); }

    /* Progress */
    .prog-t { width:100%; height:5px; background:rgba(255,255,255,0.07); border-radius:10px; overflow:hidden; margin:11px 0 3px; }
    .prog-f { height:100%; border-radius:10px; transition:width 0.8s ease; }

    /* Stats Row */
    .sr-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:1px; background:var(--border); border-radius:12px; overflow:hidden; margin-top:13px; }
    .sr { background:var(--card2); padding:11px 8px; text-align:center; }
    .sr-l { font-size:0.6rem; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:0.5px; display:block; margin-bottom:3px; }
    .sr-v { font-size:0.85rem; font-weight:700; }

    /* Bottom Nav */
    .bot-nav { position:fixed; bottom:0; left:0; width:100%; height:var(--nav-h); background:rgba(17,17,24,0.94); backdrop-filter:blur(20px); border-top:1px solid var(--border); display:flex; justify-content:space-around; align-items:center; z-index:500; padding-bottom:env(safe-area-inset-bottom); }
    .nav-item { display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--muted); cursor:pointer; transition:color 0.2s; padding:7px 10px; border-radius:14px; width:19%; }
    .nav-item.active { color:var(--blue); background:var(--blue-s); }
    .nav-item i { font-size:1.1rem; } .nav-item span { font-size:0.58rem; font-weight:700; }

    /* Modals */
    .modal { display:none; position:fixed; inset:0; z-index:600; background:rgba(0,0,0,0.75); backdrop-filter:blur(8px); align-items:flex-end; justify-content:center; }
    .modal.show { display:flex; }
    .modal-card { background:var(--card); width:100%; max-width:600px; border-radius:26px 26px 0 0; padding:24px 18px 30px; position:relative; border-top:1px solid var(--border2); max-height:88vh; overflow-y:auto; animation:slideUp 0.3s ease; }
    @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
    .mhandle { width:38px; height:4px; background:var(--border2); border-radius:2px; margin:0 auto 18px; }
    .close-btn { position:absolute; top:18px; right:18px; width:30px; height:30px; background:var(--card2); border:1px solid var(--border); border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--muted2); cursor:pointer; font-size:0.95rem; }
    .msec { background:var(--bg2); border-radius:var(--r-sm); padding:14px; margin-bottom:14px; border:1px solid var(--border); }
    .msec h4 { font-size:0.75rem; font-weight:700; color:var(--blue); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:10px; }
    .chart-pill { flex:1; padding:9px; border-radius:50px; border:1px solid var(--border); background:transparent; color:var(--muted2); font-weight:700; font-size:0.78rem; cursor:pointer; }
    .chart-pill.active { border-color:var(--blue); color:var(--blue); background:var(--blue-s); }

    /* Notes */
    .note-item { background:var(--bg2); border-radius:var(--r-sm); padding:11px; margin-bottom:7px; border:1px solid var(--border); border-left:3px solid var(--blue); }
    .note-date { font-size:0.66rem; color:var(--muted); margin-bottom:4px; }
    .note-row { display:flex; gap:7px; align-items:flex-start; }
    .note-text { flex:1; font-size:0.86rem; line-height:1.5; outline:none; background:transparent; color:var(--text); }

    /* Loading */
    .loading { position:fixed; inset:0; background:rgba(10,10,15,0.93); z-index:900; display:none; align-items:center; justify-content:center; flex-direction:column; }
    .load-ring { width:46px; height:46px; border:3px solid var(--border2); border-top-color:var(--blue); border-radius:50%; animation:spin 0.8s linear infinite; margin-bottom:14px; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .load-txt { font-size:0.88rem; font-weight:700; color:var(--muted2); }

    /* Pocket */
    .pocket-card { background:var(--card); border:1px solid var(--border); border-radius:var(--r); margin-bottom:10px; overflow:hidden; }
    .pocket-hdr { padding:13px 15px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; }
    .pocket-body { padding:0 15px 13px; }
    .pocket-entry { display:flex; align-items:center; gap:7px; padding:7px 0; border-bottom:1px solid var(--border); }
    .pocket-entry:last-child { border-bottom:none; }
    .pe-date { font-size:0.66rem; color:var(--muted); white-space:nowrap; }
    .pe-desc { flex:1; font-size:0.83rem; }
    .pe-amt { font-weight:700; font-size:0.83rem; color:var(--red); }
    .over-b { font-size:0.68rem; font-weight:700; padding:3px 8px; border-radius:20px; background:var(--red-s); color:var(--red); }
    .ok-b { font-size:0.68rem; font-weight:700; padding:3px 8px; border-radius:20px; background:var(--green-s); color:var(--green); }

    /* AI FAB */
    .ai-fab { position:fixed; bottom:calc(var(--nav-h)+14px); right:16px; width:52px; height:52px; border-radius:50%; background:linear-gradient(135deg,var(--blue),var(--purple)); border:none; color:#fff; font-size:1.2rem; display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:490; box-shadow:0 4px 20px rgba(77,159,255,0.35); transition:transform 0.2s; }
    .ai-fab:active { transform:scale(0.9); }
    .ai-fab .dot { position:absolute; top:-1px; right:-1px; width:11px; height:11px; background:var(--green); border-radius:50%; border:2px solid var(--bg); }

    /* AI Chat Popup */
    .ai-popup { position:fixed; bottom:calc(var(--nav-h)+14px); right:14px; left:14px; max-width:560px; margin:0 auto; background:var(--card); border:1px solid var(--border2); border-radius:22px; z-index:700; display:none; flex-direction:column; box-shadow:0 -6px 40px rgba(0,0,0,0.5); max-height:68vh; }
    .ai-popup.open { display:flex; animation:popUp 0.28s ease; }
    @keyframes popUp { from{opacity:0;transform:translateY(18px) scale(0.96)} to{opacity:1;transform:translateY(0) scale(1)} }
    .ai-ph { display:flex; align-items:center; justify-content:space-between; padding:13px 16px; border-bottom:1px solid var(--border); flex-shrink:0; }
    .ai-ph-l { display:flex; align-items:center; gap:9px; }
    .ai-live { width:7px; height:7px; border-radius:50%; background:var(--green); animation:blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .ai-ph h4 { font-size:0.88rem; font-weight:700; }
    .ai-ph span { font-size:0.68rem; color:var(--green); display:block; }
    .ai-close { background:var(--card2); border:1px solid var(--border); border-radius:50%; width:26px; height:26px; color:var(--muted2); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:0.88rem; }
    .ai-msgs { flex:1; overflow-y:auto; padding:12px 14px; display:flex; flex-direction:column; gap:9px; }
    .ai-msg { max-width:86%; padding:9px 13px; border-radius:15px; font-size:0.83rem; line-height:1.55; }
    .ai-msg.user { background:var(--blue-s); border:1px solid rgba(77,159,255,0.18); color:var(--text); align-self:flex-end; border-radius:15px 15px 4px 15px; }
    .ai-msg.bot { background:var(--card2); border:1px solid var(--border); color:var(--text); align-self:flex-start; border-radius:15px 15px 15px 4px; }
    .ai-msg.typing { display:flex; align-items:center; gap:4px; padding:13px; }
    .tdot { width:5px; height:5px; border-radius:50%; background:var(--muted); animation:td 1.2s infinite; }
    .tdot:nth-child(2){animation-delay:0.2s} .tdot:nth-child(3){animation-delay:0.4s}
    @keyframes td { 0%,100%{opacity:0.3;transform:scale(0.8)} 50%{opacity:1;transform:scale(1.2)} }
    .ai-qs { display:flex; gap:5px; padding:0 14px 8px; overflow-x:auto; flex-shrink:0; }
    .ai-qs::-webkit-scrollbar { display:none; }
    .qb { white-space:nowrap; padding:5px 11px; border-radius:20px; border:1px solid var(--border2); background:var(--card2); color:var(--muted2); font-size:0.73rem; font-weight:600; cursor:pointer; flex-shrink:0; }
    .qb:active { background:var(--blue-s); color:var(--blue); border-color:var(--blue); }
    .ai-inp-row { display:flex; gap:7px; padding:9px 12px 13px; border-top:1px solid var(--border); flex-shrink:0; }
    .ai-inp-row input { flex:1; background:var(--bg2); border:1px solid var(--border); border-radius:50px; padding:9px 15px; color:var(--text); font-size:0.86rem; outline:none; font-family:'Sarabun','Inter'; }
    .ai-inp-row input:focus { border-color:var(--blue); }
    .ai-send { width:36px; height:36px; border-radius:50%; border:none; background:linear-gradient(135deg,var(--blue),var(--purple)); color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:0.88rem; flex-shrink:0; }
    .ai-send:active { transform:scale(0.9); }
  </style>
</head>
<body>

<div class="loading" id="loadingOverlay">
  <div class="load-ring"></div>
  <div class="load-txt" id="aiLoaderText">กำลังโหลด...</div>
</div>

<div class="topbar">
  <div class="logo">My<span>Wealth</span></div>
  <div style="display:flex;align-items:center;gap:8px;">
    <div class="cloud-pill" id="cloudBadge"><i class="fas fa-wifi-slash"></i></div>
    <img id="mainAvatar" class="av" src="" alt="">
  </div>
</div>

<!-- HOME -->
<div id="view-home" class="view active">
  <div class="wrap">
    <div class="hero">
      <div class="h-label">เงินคงเหลือเดือนนี้ · <span id="currMonthName">...</span></div>
      <div class="h-amt" id="currentMonthBalance">฿0</div>
      <div class="h-sub">สะสมทั้งปี <b id="grandBalance">฿0</b></div>
      <div class="h-stats">
        <div class="hs"><span class="hs-l">รายรับ</span><div class="hs-v" style="color:var(--green)" id="dashIncome">0</div></div>
        <div class="hs"><span class="hs-l">รายจ่าย</span><div class="hs-v" style="color:var(--red)" id="dashExpense">0</div></div>
        <div class="hs"><span class="hs-l">ออม/ปี</span><div class="hs-v" style="color:var(--blue)" id="dashSavings">0</div></div>
      </div>
    </div>
    <div class="card">
      <div class="sec-t"><i class="fas fa-chart-pie" style="color:var(--blue);margin-right:5px;"></i>พอร์ตเงินออมสะสม</div>
      <div class="port-wrap">
        <div class="port-chart"><canvas id="savingsDoughnut"></canvas></div>
        <div id="savingsLegend" class="port-list"></div>
      </div>
    </div>
    <div class="sec-t" style="margin-top:4px;">รายเดือน</div>
    <div id="homeMonthList"></div>
  </div>
</div>

<!-- MONTH DETAIL -->
<div id="view-month" class="view">
  <div class="nav-top">
    <button class="btn-back" onclick="window.switchView('home')"><i class="fas fa-arrow-left"></i></button>
    <h2 class="page-t" id="detailMonthName">มกราคม</h2>
  </div>
  <div class="wrap" style="padding-top:0;">
    <div class="card" style="background:linear-gradient(135deg,#1a1a2e,#0f3460);border-color:var(--border2);">
      <div style="font-size:0.73rem;color:r
